<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Foto del DNI — Ataena</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .dni-guide {
      position: relative;
      margin: 20px auto;
      max-width: 340px;
      aspect-ratio: 1.586;
      border: 3px dashed rgba(168, 85, 247, 0.9);
      border-radius: 12px;
      background: rgba(168, 85, 247, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
    }
    .dni-guide p {
      color: #6b21a8;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 600;
    }
    .tips {
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
      margin: 0 0 16px;
      padding: 0 8px;
    }
    .tips li { margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🪪 Foto del DNI</h1>
      <p class="subtitle">Encuadra el anverso del documento</p>
    </header>
    <main>
      <ul class="tips">
        <li>Apoya el DNI en una mesa con buena luz.</li>
        <li>Evita reflejos y sombras sobre el texto.</li>
        <li>Fotografía solo el anverso (cara con foto y datos).</li>
      </ul>

      <div class="dni-guide" aria-hidden="true">
        <p>Coloca el DNI dentro de este marco</p>
      </div>

      <div class="buttons">
        <button id="btnCamera" class="btn btn-primary" type="button">📷 Hacer foto</button>
        <button id="btnUpload" class="btn btn-secondary" type="button">📁 Galería</button>
        <input type="file"
               id="fileInputCamera"
               accept="image/*"
               capture="environment"
               style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;z-index:-1;" />
        <input type="file"
               id="fileInputGallery"
               accept="image/*"
               style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;z-index:-1;" />
      </div>

      <canvas id="canvas" style="display:none;"></canvas>
      <p id="status"></p>
    </main>
  </div>
  <script src="/dni-photo.js"></script>
</body>
</html>
